services:

  # ── MongoDB 7.0 ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: tlc_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
    ports:
      - "27020:27017"
    volumes:
      - tlc_mongodb_data:/data/db
      - tlc_mongodb_config:/data/configdb
      # Mount raw data directory so Spark can reference it from MongoDB container if needed
      - ./data:/data/import:ro
    networks:
      - tlc_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (Web UI) ───────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: tlc_mongo_express
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-password123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8082:8081"
    networks:
      - tlc_network

  # ── Apache Kafka 3.7 (KRaft mode — no Zookeeper needed) ─────────────────────
  #
  # KRaft (Kafka Raft) eliminates the Zookeeper dependency, saving ~500 MB RAM.
  # Two listener profiles are configured:
  #   PLAINTEXT  → used internally by Spark (container-to-container: kafka:9092)
  #   EXTERNAL   → used by the host machine / notebook producer (localhost:9094)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: tlc_kafka
    restart: always
    ports:
      - "9094:9094"   # External access from host / notebook
    environment:
      # KRaft configuration
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topic defaults — auto-create enabled for ease of use
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_NUM_PARTITIONS: 4        # 4 partitions → 4 Spark tasks in parallel

      # Retention: keep only 48h of data (enough for exam day)
      KAFKA_CFG_LOG_RETENTION_HOURS: 48
      KAFKA_CFG_LOG_SEGMENT_BYTES: 104857600   # 100 MB segments

      # Performance tuning for batch-as-stream ingestion
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760    # 10 MB max message
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: 10485760

      # Unique cluster ID (KRaft requirement)
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - tlc_kafka_data:/bitnami/kafka
    networks:
      - tlc_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka UI — visual monitoring of topics & consumer groups ─────────────────
  #
  # Dashboard at http://localhost:8090
  # Shows: topic offsets, message inspector, consumer lag, throughput charts.
  # Extremely useful for the exam demo — shows messages flowing in real time.
  # ─────────────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tlc_kafka_ui
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tlc-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - tlc_network

  # ── Jupyter PySpark (custom image with Mongo connector) ──────────────────────
  jupyter-pyspark:
    build: .
    container_name: tlc_jupyter_spark
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8200:8888"   # JupyterLab
      - "4060:4040"   # Spark Web UI
    volumes:
      - .:/home/jovyan/work         # Full project mount
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      GRANT_SUDO: "yes"
      JUPYTER_TOKEN: "tlc2025"
      CHOWN_HOME: "yes"
      CHOWN_HOME_OPTS: "-R"
      # Pass MongoDB connection details into the container
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-password123}
      MONGO_AUTH_DB: admin
      MONGO_DB_BRONZE: tlc_bronze
      MONGO_DB_SILVER: tlc_silver
      MONGO_DB_GOLD:   tlc_gold
      MONGO_DB_AUDIT:  tlc_audit
      TLC_DATA_URL: https://d37ci6vzurychx.cloudfront.net/trip-data
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-4g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-4g}
      # Kafka bootstrap — accessible internally via the tlc_network
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_YELLOW_2026: tlc-yellow-2026
      KAFKA_TOPIC_GREEN_2026:  tlc-green-2026
    networks:
      - tlc_network
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G

volumes:
  tlc_mongodb_data:
  tlc_mongodb_config:
  tlc_kafka_data:

networks:
  tlc_network:
    driver: bridge
